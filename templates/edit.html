{% extends "base.html" %}

{% block title %}Редактировать{% endblock %}

{% block content %}
    <h2>✏️ Редактировать желание</h2>
    
    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}
    
    <form method="POST" class="form">
        <div class="form-group">
            <label for="name">Название *</label>
            <input type="text" id="name" name="name" value="{{ wish.name }}" required>
        </div>
        
        <div class="form-group">
            <label for="description">Описание</label>
            <textarea id="description" name="description" rows="3">{{ wish.description }}</textarea>
        </div>
        
        <div class="form-group">
            <label for="price">Цена (₽)</label>
            <input type="number" id="price" name="price" value="{{ wish.price }}">
        </div>
        
        <div class="form-group">
            <label for="link">Ссылка на магазин</label>
            <input type="url" id="link" name="link" value="{{ wish.link }}">
        </div>
        
        <div class="form-group">
            <label for="status">Статус</label>
            <select id="status" name="status">
                <option value="хочу" {% if wish.status == 'хочу' %}selected{% endif %}>Хочу</option>
                <option value="куплено" {% if wish.status == 'куплено' %}selected{% endif %}>Куплено</option>
            </select>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">💾 Сохранить</button>
            <a href="{{ url_for('index') }}" class="btn btn-secondary">Отмена</a>
        </div>
    </form>
{% endblock %}
