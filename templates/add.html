{% extends "base.html" %}

{% block title %}Добавить желание{% endblock %}

{% block content %}
    <h2>➕ Добавить желание</h2>
    
    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}
    
    <form method="POST" class="form">
        <div class="form-group">
            <label for="name">Название *</label>
            <input type="text" id="name" name="name" required>
        </div>
        
        <div class="form-group">
            <label for="description">Описание</label>
            <textarea id="description" name="description" rows="3"></textarea>
        </div>
        
        <div class="form-group">
            <label for="price">Цена (₽)</label>
            <input type="number" id="price" name="price" value="0">
        </div>
        
        <div class="form-group">
            <label for="link">Ссылка на магазин</label>
            <input type="url" id="link" name="link" placeholder="https://...">
        </div>
        
        <div class="form-group">
            <label for="status">Статус</label>
            <select id="status" name="status">
                <option value="хочу">Хочу</option>
                <option value="куплено">Куплено</option>
            </select>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">💾 Сохранить</button>
            <a href="{{ url_for('index') }}" class="btn btn-secondary">Отмена</a>
        </div>
    </form>
{% endblock %}
